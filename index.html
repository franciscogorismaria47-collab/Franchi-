    background:var(--bubble-user);

    font-family:'IBM Plex Mono', monospace;
    font-size:18px;
    color:var(--accent);
    margin-top:6px;
    display:block;
  }

    color:var(--muted);
    font-size:13px;
    margin-top:8px;
    display:block;
  }

    gap:8px;
